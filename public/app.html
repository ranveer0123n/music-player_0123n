<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sonify — Music Player</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <!-- ============ AUTH SCREEN ============ -->
  <div id="auth-screen" class="auth-screen">
    <div class="auth-card">
      <div class="auth-logo">🎵 Sonify</div>
      <h2 id="auth-title">Log in</h2>
      <form id="auth-form">
        <input type="text" id="auth-username" placeholder="Username" required />
        <input type="password" id="auth-password" placeholder="Password" required />
        <button type="submit" id="auth-submit" class="btn-primary">Log in</button>
      </form>
      <p class="auth-toggle">
        <span id="auth-toggle-text">Don't have an account?</span>
        <a href="#" id="auth-toggle">Sign up</a>
      </p>
      <p id="auth-error" class="auth-error"></p>
    </div>
  </div>

  <!-- ============ APP ============ -->
  <div id="app" class="app hidden">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">🎵 Sonify</div>
      <nav class="nav">
        <button class="nav-item active" data-view="home">🏠 <span>Home</span></button>
        <button class="nav-item" data-view="search">🔍 <span>Search</span></button>
        <button class="nav-item" data-view="library">📚 <span>Library</span></button>
      </nav>
      <div class="sidebar-section">
        <div class="sidebar-section-header">
          <span>Playlists</span>
          <button id="new-playlist-btn" title="Create playlist">＋</button>
        </div>
        <button class="nav-item" data-view="liked">❤️ <span>Liked Songs</span></button>
        <button class="nav-item" data-view="recent">🕓 <span>Recently Played</span></button>
        <ul id="playlist-list" class="playlist-list"></ul>
      </div>
      <button id="upload-btn" class="btn-primary" style="margin:12px">⬆ Upload Song</button>
      <div class="sidebar-footer">
        <span id="user-badge"></span>
        <button id="logout-btn" class="btn-ghost">Logout</button>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <header class="topbar">
        <input id="search-input" type="text" placeholder="Search songs or artists..." />
      </header>
      <section id="view" class="view"></section>
    </main>

    <!-- Bottom player -->
    <footer class="player">
      <div class="player-info">
        <img id="player-cover" src="" alt="" />
        <div class="player-meta">
          <div id="player-title">—</div>
          <div id="player-artist" class="muted">—</div>
        </div>
        <button id="player-like" class="icon-btn" title="Like">♡</button>
      </div>
      <div class="player-controls">
        <div class="player-buttons">
          <button id="btn-shuffle" class="icon-btn" title="Shuffle">🔀</button>
          <button id="btn-prev" class="icon-btn" title="Previous">⏮</button>
          <button id="btn-play" class="play-btn" title="Play">▶</button>
          <button id="btn-next" class="icon-btn" title="Next">⏭</button>
          <button id="btn-repeat" class="icon-btn" title="Repeat">🔁</button>
        </div>
        <div class="progress-wrap">
          <span id="time-current" class="muted">0:00</span>
          <input id="progress" type="range" min="0" max="100" value="0" step="0.1" />
          <span id="time-total" class="muted">0:00</span>
        </div>
      </div>
      <div class="player-volume">
        <span>🔊</span>
        <input id="volume" type="range" min="0" max="1" step="0.01" value="0.8" />
      </div>
    </footer>
  </div>

  <script src="/script.js"></script>
</body>
</html>
